<!--Operadores anidados nesting 
ejemplo : div>ul>li + enter

crea el bloque
-->

        <ul>
            <li></li>
        </ul>

<!--Operadores hermanos sibling
estan al mismo nivel
ejemplo : div+p+bq

crea el bloque
-->
<div></div>
<p></p>
<blockquote></blockquote>

<!--Conbinar
div>p>span+em +enter
-->

    <p><span></span><em></em></p>

<!--
 multiplicacion
ul>li*li*li + enter
-->

<!--
Sin Agrupar
div>header>ul>li*2+a+footer>p
-->
<div>
    <header>
        <ul>
            <li></li>
            <li></li>
            <a href=""></a>
            <footer>
                <p></p>
            </footer>
        </ul>
    </header>
</div> 

<!--
Con Agrupacíon
div>(header>ul>li*2+a)+footer>p
-->
<div>
    <header>
        <ul>
            <li></li>
            <li></li>
            <a href=""></a>
        </ul>
    </header>
    <footer>
        <p></p>
    </footer>
</div>
